<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Live</title>
    <style>
      :root {
        font-family: "Avenir Next", Avenir, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #eef2f7;
        background: #090b10;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 24px;
      }

      main {
        display: grid;
        gap: 18px;
        max-width: 960px;
        margin: 0 auto;
      }

      h1,
      h2 {
        margin: 0;
      }

      section {
        display: grid;
        gap: 12px;
        padding: 16px;
        border-radius: 10px;
        border: 1px solid #222733;
        background: #121722;
        box-shadow: 0 12px 34px rgba(0, 0, 0, 0.28);
      }

      .client,
      .row-card {
        display: grid;
        gap: 8px;
        padding: 12px;
        border: 1px solid #2b3342;
        border-radius: 8px;
        background: #171d29;
      }

      .meta {
        color: #8f98a8;
        font-size: 13px;
      }

      textarea {
        min-height: 76px;
        width: 100%;
        resize: vertical;
        color: #f4f7fb;
        border: 1px solid #343d4f;
        border-radius: 8px;
        background: #0c111a;
        padding: 10px;
        font: inherit;
      }

      textarea:focus {
        outline: none;
        border-color: #39b2dd;
        box-shadow: 0 0 0 3px rgba(57, 178, 221, 0.18);
      }

      .empty {
        color: #8f98a8;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Blue bendz Blue bendz</h1>
      <section>
        <h2>Prijungtu acauntyzu</h2>
        <div id="clients"></div>
      </section>
      <section>
        <h2>Visible rows (chat people)</h2>
        <div id="rows"></div>
      </section>
    </main>
    <script src="config.js"></script>
    <script src="admin.js"></script>
  </body>
</html>
